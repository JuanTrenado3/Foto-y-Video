<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Estudio Fotográfico</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 300px; }
        .login-container h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #666; }
        .form-group input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .btn-submit { width: 100%; padding: 10px; background-color: #007BFF; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .btn-submit:hover { background-color: #0056b3; }
        .error-msg { color: red; text-align: center; margin-bottom: 15px; font-size: 14px; display: none; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Iniciar Sesión</h2>
    
    <div id="mensajeError" class="error-msg"></div>

    <form id="formLogin">
        <div class="form-group">
            <label for="telefono">Teléfono:</label>
            <input type="text" id="telefono" name="telefono" value="" required>
        </div>
        <div class="form-group">
            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" value="123" required>
        </div>
        <button type="submit" class="btn-submit">Ingresar</button>
    </form>
</div>

<script>
    document.getElementById("formLogin").addEventListener("submit", function(event) {
        event.preventDefault();

        const formData = new URLSearchParams(new FormData(this));

        // Aquí le decimos que hable con el archivo ProcesarLogin de Java
        fetch('ProcesarLogin', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if(data.status === 'success') {
                //guardamos el rol en memoria de navegador
                sessionStorage.setItem('rol', data.rol); 
                
                // Redirigimos al panel principal
                window.location.href = 'index.html'; 
            } else {
                const errorDiv = document.getElementById("mensajeError");
                errorDiv.innerText = data.mensaje;
                errorDiv.style.display = "block";
            }
        })
        .catch(error => console.error('Error:', error));
    });
</script>

</body>
</html>
