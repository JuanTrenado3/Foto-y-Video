<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestionar Paquetes - Estudio Fotográfico</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }
        .header { background-color: #333; color: white; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-back { background-color: #6c757d; color: white; border: none; padding: 8px 15px; border-radius: 4px; text-decoration: none; }
        
        .container { display: flex; gap: 20px; flex-wrap: wrap; }
        .form-container, .table-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); flex: 1; min-width: 300px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        
        .btn-submit { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .btn-submit:hover { background-color: #218838; }
        .btn-clear { width: 100%; padding: 10px; background-color: #ffc107; color: #333; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-clear:hover { background-color: #e0a800; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #007BFF; color: white; }
        .btn-edit { background-color: #17a2b8; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .btn-delete { background-color: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h2>Gestión de Paquetes</h2>
    <a href="index.html" class="btn-back">Volver al Menú</a>
</div>

<div class="container">
    <div class="form-container">
        <h3 id="tituloFormulario">Registrar Nuevo Paquete</h3>
        <form id="formPaquete">
            <input type="hidden" id="id_paquete" name="id_paquete" value="">
            
            <div class="form-group">
                <label for="categoria_evento">Categoría del Evento:</label>
                <select id="categoria_evento" name="categoria_evento" required>
                    <option value="">Seleccione...</option>
                    <option value="Boda">Boda</option>
                    <option value="XV Años">XV Años</option>
                    <option value="Bautizo">Bautizo</option>
                    <option value="Graduación">Graduación</option>
                    <option value="Sesión Casual">Sesión Casual</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="nombre_paquete">Nombre del Paquete:</label>
                <input type="text" id="nombre_paquete" name="nombre_paquete" placeholder="Ej. Paquete Premium" required>
            </div>
            
            <div class="form-group">
                <label for="num_fotos">Número de Fotos (Impresas):</label>
                <input type="number" id="num_fotos" name="num_fotos" value="0">
            </div>
            
            <div class="form-group">
                <label for="incluye_video">¿Incluye Video?</label>
                <select id="incluye_video" name="incluye_video">
                    <option value="1">Sí</option>
                    <option value="0">No</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="incluye_sesion">¿Incluye Sesión Previa?</label>
                <select id="incluye_sesion" name="incluye_sesion">
                    <option value="1">Sí</option>
                    <option value="0">No</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="incluye_foto_grande">¿Incluye Foto Grande (Cuadro)?</label>
                <select id="incluye_foto_grande" name="incluye_foto_grande">
                    <option value="1">Sí</option>
                    <option value="0">No</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="precio_base">Precio Base ($):</label>
                <input type="number" step="0.01" id="precio_base" name="precio_base" required>
            </div>
            
            <button type="submit" class="btn-submit" id="btnGuardar">Guardar Paquete</button>
            <button type="button" class="btn-clear" onclick="limpiarFormulario()">Limpiar / Cancelar Edición</button>
        </form>
    </div>

    <div class="table-container">
        <h3>Paquetes Registrados</h3>
        <table>
            <thead>
                <tr>
                    <th>Categoría</th>
                    <th>Paquete</th>
                    <th>Precio</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaPaquetes">
                </tbody>
        </table>
    </div>
</div>

<script>
    //funcion para limpiar formulario
    function limpiarFormulario() {
        document.getElementById('formPaquete').reset();
        document.getElementById('id_paquete').value = "";
        document.getElementById('tituloFormulario').innerText = "Registrar Nuevo Paquete";
        document.getElementById('btnGuardar').innerText = "Guardar Paquete";
    }
    document.getElementById("formPaquete").addEventListener("submit", function(event) {
        event.preventDefault(); //Esto evitya que la pagina se actualice

        const formData = new URLSearchParams(new FormData(this));

        fetch('ProcesarPaquete', {
            method: 'POST',
            body: formData
        })
        .then(response => response.text())
        .then(data => {
            if(data === 'exito') {
                alert("¡Paquete guardado correctamente!");
                limpiarFormulario();
                cargarTablaPaquetes(); 
            } else {
                alert("Error al guardar el paquete.");
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert("Hubo un problema de conexión con el servidor.");
        });
    });
    //tabla de paquetes jalando desde bd
    function cargarTablaPaquetes() {
        fetch('ObtenerPaquetes')
        .then(response => response.text())
        .then(html => {
   
            document.getElementById('tablaPaquetes').innerHTML = html;
        })
        .catch(error => console.error('Error:', error));
    }
    
//funcion poara que se pueda editar 
    function editarPaquete(id, categoria, nombre, fotos, video, sesion, fotoGrande, precio) {
        document.getElementById('id_paquete').value = id;
        document.getElementById('categoria_evento').value = categoria;
        document.getElementById('nombre_paquete').value = nombre;
        document.getElementById('num_fotos').value = fotos;
        document.getElementById('incluye_video').value = video;
        document.getElementById('incluye_sesion').value = sesion;
        document.getElementById('incluye_foto_grande').value = fotoGrande; 
        document.getElementById('precio_base').value = precio;

        document.getElementById('tituloFormulario').innerText = "Editar Paquete";
        document.getElementById('btnGuardar').innerText = "Actualizar Paquete";
    }

    //funcion para eliminar un paquete
    function eliminarPaquete(id) {
        //Ventana de confirmacion de accion
        if(confirm("¿Estás completamente seguro de que deseas eliminar este paquete?")) {
            fetch('EliminarPaquete?id=' + id, {
                method: 'GET'
            })
            .then(response => response.text())
            .then(data => {
                if(data === 'exito') {
                    alert("Paquete eliminado correctamente.");
                    cargarTablaPaquetes(); // Recargamos la tabla para que desaparezca
                } else {
                    alert("Error: No se pudo eliminar. Es posible que este paquete ya esté siendo usado en un contrato.");
                }
            })
            .catch(error => console.error('Error:', error));
        }
    }
    
    window.onload = function() {
        cargarTablaPaquetes();
    };
</script>

</body>
</html>
