<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrar Contrato - Estudio Fotográfico</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }
        .header { background-color: #333; color: white; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-back { background-color: #6c757d; color: white; border: none; padding: 8px 15px; border-radius: 4px; text-decoration: none; }
        .form-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 800px; margin: auto; }
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .form-group { margin-bottom: 15px; }
        .form-group.full-width { grid-column: span 2; }
        label { display: block; margin-bottom: 5px; color: #333; font-weight: bold; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .btn-submit { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 15px; grid-column: span 2; }
        .btn-submit:hover { background-color: #218838; }
    </style>
</head>
<body>

<div class="header">
    <h2>Registrar Nuevo Evento (Contrato)</h2>
    <a href="index.html" class="btn-back">Volver al Menú</a>
</div>

<div class="form-container">
    <form id="formContrato" action="ProcesarContrato" method="POST">
        <div class="form-grid">
            
            <div class="form-group">
                <label for="nombre_cliente">Nombre del Cliente (Contratante):</label>
                <input type="text" id="nombre_cliente" name="nombre_cliente" required>
            </div>
            <div class="form-group">
                <label for="tel_cliente">Teléfono del Cliente:</label>
                <input type="text" id="tel_cliente" name="tel_cliente" required>
            </div>
            <div class="form-group full-width">
                <label for="nombre_festejado">Nombre del Festejado(s) (Ej. Quinceañera o Novios):</label>
                <input type="text" id="nombre_festejado" name="nombre_festejado">
            </div>

            <div class="form-group">
                <label for="fecha_evento">Fecha del Evento:</label>
                <input type="date" id="fecha_evento" name="fecha_evento" required>
            </div>
            
            <div class="form-group">
                <label for="id_paquete">Paquete Contratado:</label>
                <select id="id_paquete" name="id_paquete" required>
                    <option value="">Cargando paquetes...</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="dir_misa">Dirección de la Misa:</label>
                <input type="text" id="dir_misa" name="dir_misa">
            </div>
            <div class="form-group">
                <label for="hora_misa">Hora de la Misa:</label>
                <input type="time" id="hora_misa" name="hora_misa">
            </div>
            <div class="form-group">
                <label for="dir_fiesta">Dirección de la Recepción/Fiesta:</label>
                <input type="text" id="dir_fiesta" name="dir_fiesta">
            </div>
            <div class="form-group">
                <label for="hora_fiesta">Hora de la Fiesta:</label>
                <input type="time" id="hora_fiesta" name="hora_fiesta">
            </div>

            <div class="form-group">
                <label for="costo_total">Costo Total ($):</label>
                <input type="number" step="0.01" id="costo_total" name="costo_total" required>
            </div>
            <div class="form-group">
                <label for="anticipo_pagado">Anticipo Pagado ($):</label>
                <input type="number" step="0.01" id="anticipo_pagado" name="anticipo_pagado" required>
            </div>

            <button type="submit" class="btn-submit">Guardar Contrato</button>
        </div>
    </form>
</div>

<script>
    function cargarOpcionesPaquetes() {
        fetch('ObtenerOpcionesPaquetes')
        .then(response => response.text())
        .then(html => {
            document.getElementById('id_paquete').innerHTML = html;
        })
        .catch(error => console.error('Error al cargar paquetes:', error));
    }

    window.onload = function() {
        cargarOpcionesPaquetes();
    };
</script>

</body>
</html>
